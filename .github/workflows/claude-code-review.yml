name: Claude Code Review

on:
  pull_request:
    types: [ready_for_review]
    # Optional: Only run on specific file changes
    # paths:
    #   - "src/**/*.ts"
    #   - "src/**/*.tsx"
    #   - "src/**/*.js"
    #   - "src/**/*.jsx"

jobs:
  claude-review:
    timeout-minutes: 60
    # Optional: Filter by PR author
    # if: |
    #   github.event.pull_request.user.login == 'external-contributor' ||
    #   github.event.pull_request.user.login == 'new-developer' ||
    #   github.event.pull_request.author_association == 'FIRST_TIME_CONTRIBUTOR'

    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - name: Check PR size
        id: pr-size
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          CHANGES=$(gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }} --jq '.additions + .deletions')
          echo "total_changes=$CHANGES" >> "$GITHUB_OUTPUT"
          if [ "$CHANGES" -gt 1000 ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Skipping review: PR has $CHANGES changed lines (threshold: 1000)"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "PR has $CHANGES changed lines, proceeding with review"
          fi

      - name: Checkout repository
        if: steps.pr-size.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Resolve author OAuth token
        if: steps.pr-size.outputs.skip != 'true'
        id: auth
        run: |
          SECRET_NAME="CLAUDE_CODE_OAUTH_TOKEN_$(echo "${{ github.event.pull_request.user.login }}" | tr '[:lower:]' '[:upper:]' | tr '-' '_')"
          echo "secret_name=${SECRET_NAME}" >> "$GITHUB_OUTPUT"
          echo "Resolved token secret: ${SECRET_NAME} (from GitHub user: ${{ github.event.pull_request.user.login }})"

      - name: Validate OAuth token exists
        if: steps.pr-size.outputs.skip != 'true'
        env:
          OAUTH_TOKEN: ${{ secrets[steps.auth.outputs.secret_name] }}
        run: |
          if [ -z "$OAUTH_TOKEN" ]; then
            echo "::error::Secret ${{ steps.auth.outputs.secret_name }} not found. Please add the OAuth token for this team member. Run 'claude setup-token' to generate one."
            exit 1
          fi

      - name: Run Claude Code Review
        if: steps.pr-size.outputs.skip != 'true'
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          track_progress: true
          claude_code_oauth_token: ${{ secrets[steps.auth.outputs.secret_name] }}
          claude_args: '--max-turns 50 --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"'
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          prompt: '/code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }} --comment'
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options

      - name: Notify on failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments \
            -f body="⚠️ **Claude Code Review failed to run.** Check the [workflow logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details."
